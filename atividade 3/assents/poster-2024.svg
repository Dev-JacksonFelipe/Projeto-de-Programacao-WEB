<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 1000" role="img" aria-labelledby="title desc">
  <title id="title">Poster 2024</title>
  <desc id="desc">Cartaz local criado para representar o filme 2024.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="700" height="1000" fill="url(#bg)"/>
  <circle cx="560" cy="180" r="120" fill="#f59e0b" opacity="0.4"/>
  <circle cx="145" cy="810" r="170" fill="#0b1220" opacity="0.55"/>
  <path d="M460 150 L640 1000 L700 1000 L700 0 L520 0 Z" fill="#0b1220" opacity="0.25"/>
  <path d="M80 880 C180 700 310 620 470 575 C540 555 595 520 640 455" fill="none" stroke="url(#shine)" stroke-width="14" stroke-linecap="round" opacity="0.65"/>

  <text x="70" y="125" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" letter-spacing="10">EM CARTAZ</text>
  <text x="70" y="520" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="220" font-weight="800">2024</text>
  <text x="75" y="610" fill="#fde68a" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" letter-spacing="4">UM FUTURO PERTO DEMAIS</text>
  <text x="75" y="780" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700">Thriller | Ficcao</text>
  <text x="75" y="845" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="28">Cartaz local criado para o layout</text>
  <rect x="72" y="890" width="210" height="14" rx="7" fill="#facc15"/>
  <rect x="72" y="925" width="120" height="14" rx="7" fill="#ffffff" opacity="0.85"/>
</svg>
